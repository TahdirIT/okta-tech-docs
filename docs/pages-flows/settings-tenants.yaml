from: settings-tenants
flows:
  - to: settings-tenants
    type: form
    method: POST
    middleware: [auth, context, permission:tenants.view]
    source: livewire

  - to: settings-tenant-members
    type: link
    method: GET
    middleware: [auth, context]
    source: blade

  - to: settings-general
    type: link
    method: GET
    middleware: [auth]
    source: blade

  - to: settings-permissions
    type: link
    method: GET
    middleware: [auth, context, permission:rbac.permissions.view]
    source: blade

  - to: settings-roles
    type: link
    method: GET
    middleware: [auth, context, permission:rbac.roles.view]
    source: blade

  - to: settings-users
    type: link
    method: GET
    middleware: [auth, context, permission:rbac.users.view]
    source: blade

  - to: settings-countries
    type: link
    method: GET
    middleware: [auth]
    source: blade
