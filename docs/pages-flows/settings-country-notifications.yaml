    middleware: [auth]
    source: blade

  - to: settings-country-calendar
    type: link
    method: GET
    middleware: [auth]
    source: blade

  - to: settings-country-weekdays
    type: link
    method: GET
    middleware: [auth]
    source: blade

  - to: settings-country-entity-registration
    type: link
