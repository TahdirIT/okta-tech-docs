from: appearance-edit
flows:
  - to: devices-show
    type: link
    method: GET
    middleware: [auth]
    source: blade

  - to: appearance-edit
    type: form
    method: POST
    middleware: [auth, verified]
    source: livewire

  - to: profile-edit
    type: link
    method: GET
    middleware: [auth]
    source: blade

  - to: login-identifiers-show
    type: link
    method: GET
    middleware: [auth]
    source: blade

  - to: two-factor-show
    type: link
    method: GET
    middleware: [auth, verified]
    source: blade
